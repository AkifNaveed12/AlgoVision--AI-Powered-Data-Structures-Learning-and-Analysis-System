version: '3.8'

services:

  # ── Backend (FastAPI + All Compilers) ──────────────────────────────────────
  # The backend image includes Python3, Node.js, g++, and Java
  # so code execution works completely inside this single container.
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (React + Nginx) ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: "http://localhost:8000"
        VITE_SUPABASE_URL: "${VITE_SUPABASE_URL}"
        VITE_SUPABASE_ANON_KEY: "${VITE_SUPABASE_ANON_KEY}"
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
