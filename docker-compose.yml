version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        # Pass variables to build-time so Vite can embed them
        VITE_API_BASE_URL: "http://localhost:8000"
        VITE_SUPABASE_URL: "${SUPABASE_URL}"
        VITE_SUPABASE_ANON_KEY: "${SUPABASE_ANON_KEY}"
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
